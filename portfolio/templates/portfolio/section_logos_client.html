{% load wagtailcore_tags i18n %}

{% if images %}
    <section class="py-16 bg-surface-container-low">
        <div class="max-w-[1280px] mx-auto px-4 md:px-16">
            <div class="text-center mb-10">
                <h3 class="font-label-caps text-label-caps uppercase text-on-surface-variant tracking-widest">{% trans "Companies Assisted by Maioreb business advisory fzco" %}</h3>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 items-center">
                {% for block in images %}
                    <div class="flex justify-center grayscale hover:grayscale-0 transition-all">
                        <img src="{{ block.value.file.url }}" alt="Client logo" class="max-h-12 w-auto object-contain"/>
                    </div>
                {% endfor %}
            </div>
        </div>
    </section>
{% endif %}
