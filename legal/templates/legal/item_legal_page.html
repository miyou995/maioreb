{% extends "base.html" %}
{% load wagtailcore_tags static i18n %}

{% block content %}

    <section class="relative py-32 flex items-center overflow-hidden bg-primary">
        <div class="relative z-10 max-w-[1280px] mx-auto px-4 md:px-16">
            <h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-white mb-4">{{ page.title }}</h1>
            <p class="font-body-lg text-body-lg text-surface-container-high">
                <a href="{{ page.get_parent.url }}" class="hover:text-white transition-colors">{{ page.get_parent.title }}</a>
                <span class="mx-2">/</span>{{ page.title }}
            </p>
        </div>
    </section>

    <section class="py-[120px] bg-background">
        <div class="max-w-3xl mx-auto px-4 md:px-16">
            <div class="font-body-md text-body-md text-on-surface-variant prose max-w-none">
                {{ page.description|richtext }}
            </div>
            <div class="mt-12">
                <a href="{{ page.get_parent.url }}"
                   class="inline-flex items-center gap-2 font-label-caps text-label-caps uppercase text-primary hover:text-secondary transition-colors">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    {% trans "Back" %}
                </a>
            </div>
        </div>
    </section>

{% endblock %}
