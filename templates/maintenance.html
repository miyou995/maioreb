<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maintenance in Progress</title>
  <style>
    :root {
      --bg-1: #061a1a;
      --bg-2: #0e2f2f;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f5f7f7;
      --muted: #c8d4d4;
      --accent: #5fe0c4;
      --border: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, #164646 0, transparent 45%),
        radial-gradient(circle at 80% 80%, #0b2727 0, transparent 40%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }

    main {
      width: min(680px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px 28px;
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(95, 224, 196, 0.15);
      border: 1px solid rgba(95, 224, 196, 0.35);
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.2;
    }

    p {
      margin: 14px auto 0;
      max-width: 56ch;
      line-height: 1.6;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      margin: 24px auto 0;
      box-shadow: 0 0 16px rgba(95, 224, 196, 0.8);
      animation: pulse 1.6s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.75;
      }
      50% {
        transform: scale(1.4);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <span class="badge">Temporary Maintenance</span>
    <h1>We are Building the website.</h1>
    <p>
      The website is currently unavailable while scheduled updates are in progress.
      Please check back shortly.
    </p>
    <div class="dot" aria-hidden="true"></div>
  </main>
</body>
</html>
