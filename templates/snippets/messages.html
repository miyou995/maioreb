{% load i18n %}
{% if messages %}
    <div id="flash-messages" class="fixed top-6 right-6 z-50 flex flex-col gap-3 max-w-sm">
        {% for message in messages %}
            <div class="glass-card rounded-xl px-5 py-4 flex items-start gap-3 shadow-lg"
                 role="alert">
                {% if message.tags == 'error' %}
                    <span class="material-symbols-outlined text-error flex-shrink-0">error</span>
                {% elif message.tags == 'warning' %}
                    <span class="material-symbols-outlined text-yellow-600 flex-shrink-0">warning</span>
                {% else %}
                    <span class="material-symbols-outlined text-secondary flex-shrink-0">check_circle</span>
                {% endif %}
                <p class="font-body-md text-body-md text-on-background flex-1">{{ message }}</p>
                <button onclick="this.parentElement.remove()" aria-label="Close"
                        class="text-on-surface-variant hover:text-on-background transition-colors flex-shrink-0">
                    <span class="material-symbols-outlined text-sm">close</span>
                </button>
            </div>
        {% endfor %}
    </div>
    <script>
        setTimeout(function(){
            var el = document.getElementById('flash-messages');
            if(el) el.style.opacity='0', el.style.transition='opacity 0.5s', setTimeout(function(){el.remove()},500);
        }, 5000);
    </script>
{% endif %}
