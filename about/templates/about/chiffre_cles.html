{% load i18n %}

{% if key_numbers %}
    <section class="py-[120px] bg-primary text-white">
        <div class="max-w-[1280px] mx-auto px-4 md:px-16">
            <div class="text-center mb-16">
                <h2 class="font-label-caps text-label-caps text-secondary-fixed uppercase tracking-widest mb-4">{% trans "Key Numbers" %}</h2>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
                {% for block in key_numbers %}
                    {% if block.block_type == "numbers" %}
                        {% for kn in block.value %}
                            <div class="text-center">
                                <span class="font-display-lg text-display-lg text-white font-bold">
                                    {{ kn.number }}{% if kn.symbol %}{{ kn.symbol }}{% endif %}
                                </span>
                                <p class="font-label-caps text-label-caps uppercase text-secondary-fixed mt-2">{{ kn.label }}</p>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endfor %}
            </div>
        </div>
    </section>
{% endif %}
