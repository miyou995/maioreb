{% extends "base.html" %}
{% load wagtailcore_tags wagtailimages_tags %}

{% block content %}


<main id="primary" class="site-main">
    <div class="space-for-header"></div>
    <section class="tj-page-header section-gap-x" 
        {% if page.hero_image %}
            data-bg-image="{{ page.hero_image.file.url }}"
        {% endif %}>
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="tj-page-header-content text-center">
                        <h1 class="tj-page-title">{{ page.title }}</h1>
                        <div class="tj-page-link">
                            <span><i class="tji-home"></i></span>
                            <span>
                                <a href="{{ page.get_parent.url }}">{{ page.get_parent.title }}</a>
                            </span>
                            <span><i class="tji-arrow-right"></i></span>
                            <span>
                                <span>{{ page.title }}</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="page-header-overlay"  
            {% if page.hero_image %}
                data-bg-image="{{ page.hero_image.file.url }}"
            {% endif %}>
        </div>
    </section>


    <section class="team-details slidebar-stickiy-container">
        <div class="container">
            {% for block in page.culture_content  %}
                
                        <div class="row justify-content-center">
                        <!--  left -->
                            <div class="col-12 col-md-8 col-lg-5">
                                <div class="team-details__img slidebar-stickiy wow fadeInUp" data-wow-delay=".1s">
                                    <img src="{{ block.value.image.file.url }}" alt="">
                                </div>
                            </div>
                        <!-- right -->
                            <div class="col-12 col-lg-7 ">
                                <div class="team-details__content">
                                    <h2 class="team-details__name title-anim">{{block.value.title}}</h2>
                                    <p class="wow fadeInUp" data-wow-delay=".3s">
                                        {{block.value.text}}
                                    </p>
                                </div>
                            </div>
                        </div>
                    
                 
            {% endfor %}
        </div>
    </section>
</main>



{% endblock %}
